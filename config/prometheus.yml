global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'zhaozhou-bridge-monitor'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'go-api'
    static_configs:
      - targets: ['go-api:8080']
    metrics_path: '/metrics'
    honor_labels: true

  - job_name: 'go-api-pprof'
    static_configs:
      - targets: ['go-api:8080']
    metrics_path: '/debug/pprof'
    scrape_interval: 60s

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb:5432']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'mosquitto'
    static_configs:
      - targets: ['mosquitto:1883']
    scrape_interval: 30s

  - job_name: 'sensor-simulator'
    static_configs:
      - targets: ['sensor-simulator:8080']
    scrape_interval: 30s
