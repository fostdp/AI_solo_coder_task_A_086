version: "3.8"

networks:
  zhaozhou-bridge-net:
    driver: bridge

volumes:
  timescaledb_data:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  grafana_data:

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: zhaozhou_bridge_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zhaozhou_bridge
      POSTGRES_USER: bridge_admin
      POSTGRES_PASSWORD: bridge2024
      TZ: Asia/Shanghai
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge_admin -d zhaozhou_bridge"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - zhaozhou-bridge-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: zhaozhou_bridge_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./scripts/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - zhaozhou-bridge-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t 'health/check' -m 'ping' -q 1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  go-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhaozhou_bridge_api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      TZ: Asia/Shanghai
      CONFIG_PATH: /app/config/bridge_config.json
      DB_URL: postgres://bridge_admin:bridge2024@timescaledb:5432/zhaozhou_bridge?sslmode=disable
      MQTT_HOST: mosquitto:1883
      FEM_USE_SUBMODELING: "true"
      GIN_MODE: release
    volumes:
      - ./config/bridge_config.json:/app/config/bridge_config.json:ro
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - zhaozhou-bridge-net

  sensor-simulator:
    build:
      context: ./scripts
      dockerfile: Dockerfile-simulator
    container_name: zhaozhou_bridge_simulator
    restart: unless-stopped
    depends_on:
      go-api:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      API_BASE: http://go-api:8080
      SIM_INTERVAL: 600
      SIM_FAST_MODE: "false"
      SIM_BACKFILL_DAYS: 7
      INJECT_TEMP: 0
      INJECT_LOAD: 1.0
      INJECT_STRAIN_SPIKE: ""
      INJECT_SETTLEMENT: 0
      INJECT_CRACK_GROWTH: 0
      DURATION_HOURS: 0
    networks:
      - zhaozhou-bridge-net
    profiles:
      - simulator
      - all

  prometheus:
    image: prom/prometheus:latest
    container_name: zhaozhou_bridge_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1y'
      - '--web.enable-lifecycle'
    networks:
      - zhaozhou-bridge-net
    profiles:
      - monitoring
      - all

  grafana:
    image: grafana/grafana-oss:latest
    container_name: zhaozhou_bridge_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - timescaledb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: bridge2024
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
      TZ: Asia/Shanghai
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - zhaozhou-bridge-net
    profiles:
      - monitoring
      - all
